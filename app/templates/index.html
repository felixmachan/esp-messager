<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OLED Message</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; max-width: 720px; margin: 40px auto; padding: 0 16px; }
      .card { border: 1px solid #e5e7eb; border-radius: 16px; padding: 16px; }
      input, textarea { width: 100%; padding: 10px; border-radius: 12px; border: 1px solid #d1d5db; }
      textarea { min-height: 90px; }
      button { padding: 10px 14px; border-radius: 12px; border: 0; cursor: pointer; }
      .row { display: grid; gap: 12px; }
      .muted { color: #6b7280; }
      code { background: #f3f4f6; padding: 2px 6px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <h1>OLED Message Server</h1>
    <div class="card row">
      {% if not authed %}
        <p class="muted">Add meg a tokent a URL-ben: <code>/?token=...</code></p>
      {% else %}
        <p class="muted">ESP endpoint: <code>/msg?token={{token}}</code></p>
        <form method="post" action="/ui/set" class="row">
          <input type="hidden" name="token" value="{{token}}" />
          <label>
            Üzenet:
            <textarea name="text" maxlength="200">{{text}}</textarea>
          </label>
          <button type="submit">Mentés</button>
        </form>
      {% endif %}
    </div>
  </body>
</html>
